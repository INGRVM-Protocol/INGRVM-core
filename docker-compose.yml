# Calyx Local Mesh Simulation (Austin Genesis)
# Spawning 3-5 nodes to test Spike Protocol and Sharding logic.

services:
  calyx_seed:
    build: .
    image: calyx-node:latest
    container_name: calyx_seed
    ports:
      - "8000:8000"
      - "60001:60001"
    environment:
      - CALYX_ROLE=SEED
    volumes:
      - .:/app

  calyx_node_01:
    image: calyx-node:latest
    container_name: calyx_node_01
    depends_on:
      - calyx_seed
    environment:
      - CALYX_ROLE=NEURON
      - BOOTSTRAP_ADDR=calyx_seed
    volumes:
      - .:/app

  calyx_node_02:
    image: calyx-node:latest
    container_name: calyx_node_02
    depends_on:
      - calyx_seed
    environment:
      - CALYX_ROLE=NEURON
      - BOOTSTRAP_ADDR=calyx_seed
    volumes:
      - .:/app

# Network configuration for libp2p and local discovery
networks:
  default:
    driver: bridge
